<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Engineering OS — Command Palette</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F172A;--raised:#1E293B;--overlay:#1B2638;--border:#1E293B;--border-2:#334155;--text:#F8FAFC;--text-2:#94A3B8;--muted:#64748B;--action:#2563EB;--accent:#06B6D4;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);height:100vh;color:var(--text);-webkit-font-smoothing:antialiased}
.scrim{position:fixed;inset:0;background:rgba(2,6,15,.66)}
.pal{position:fixed;top:96px;left:50%;transform:translateX(-50%);width:600px;background:var(--overlay);border:1px solid var(--border-2);border-radius:14px;box-shadow:0 24px 70px rgba(0,0,0,.55);overflow:hidden}
.pin{display:flex;align-items:center;gap:11px;padding:15px 16px;border-bottom:1px solid var(--border)}
.pin .q{font-size:16px;color:var(--text)}.pin .cur{color:var(--accent);font-weight:600}
.pin .esc{margin-left:auto;font-family:var(--mono);font-size:11px;border:1px solid var(--border-2);border-radius:4px;padding:2px 6px;color:var(--muted)}
.glab{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:10px 16px 4px}
.row{display:flex;align-items:center;gap:11px;padding:9px 16px;font-size:13.5px;color:var(--text-2)}
.row .ic{width:22px;height:22px;border-radius:6px;background:var(--raised);border:1px solid var(--border-2);display:grid;place-items:center;font-size:12px;color:var(--text-2)}
.row .sc{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
.row.sel{background:var(--raised);color:var(--text)}
.row.sel .ic{background:rgba(6,182,212,.16);border-color:rgba(6,182,212,.4);color:var(--accent)}
.row b{color:var(--accent);font-weight:600}
.pf{display:flex;align-items:center;gap:14px;padding:9px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-family:var(--mono)}
</style></head><body>
<div class="scrim"></div>
<div class="pal">
  <div class="pin">⌕ <span class="q"><b>Gen</b><span class="cur">▏</span></span><span class="esc">esc</span></div>
  <div class="glab">Actions</div>
  <div class="row sel"><span class="ic">✦</span> <span><b>Gen</b>erate PRD from Vision</span><span class="sc">⌘↵</span></div>
  <div class="row"><span class="ic">✦</span> <span><b>Gen</b>erate Vision</span><span class="sc">⌘G</span></div>
  <div class="row"><span class="ic">↗</span> <span>Export repository to GitHub</span><span class="sc">⌘E</span></div>
  <div class="glab">Projects</div>
  <div class="row"><span class="ic">▢</span> engineering-os<span class="sc">↵</span></div>
  <div class="row"><span class="ic">▢</span> salon-erp<span class="sc">↵</span></div>
  <div class="pf"><span>↑↓ navigate</span><span>↵ select</span><span>⌘K toggle</span></div>
</div></body></html>
