# Canonical label set, synced to repositories by workflows/label-sync.yml
# (crazy-max/ghaction-github-labeler format). Labels are NOT inherited automatically.

# Type
- name: "type: feature"
  color: "1D76DB"
  description: "A new feature"
- name: "type: bug"
  color: "D73A4A"
  description: "Something isn't working"
- name: "type: docs"
  color: "0075CA"
  description: "Documentation only"
- name: "type: refactor"
  color: "5319E7"
  description: "Code change without behavior change"
- name: "type: perf"
  color: "FBCA04"
  description: "Performance improvement"
- name: "type: test"
  color: "BFD4F2"
  description: "Tests"
- name: "type: task"
  color: "C2E0C6"
  description: "Engineering task / chore"

# Priority
- name: "priority: high"
  color: "B60205"
  description: "Address as soon as possible"
- name: "priority: medium"
  color: "D93F0B"
  description: "Important, not urgent"
- name: "priority: low"
  color: "0E8A16"
  description: "Nice to have"

# Status
- name: "status: triage"
  color: "EDEDED"
  description: "Needs assessment"
- name: "status: blocked"
  color: "000000"
  description: "Blocked by a dependency"
- name: "status: in progress"
  color: "FBCA04"
  description: "Actively being worked on"
- name: "status: needs review"
  color: "FEF2C0"
  description: "Awaiting review"

# Area
- name: "area: mobile"
  color: "BFDADC"
  description: "Android / Flutter / RN / iOS"
- name: "area: frontend"
  color: "C5DEF5"
  description: "React / Next.js"
- name: "area: backend"
  color: "D4C5F9"
  description: "Python / Node / APIs"
- name: "area: ai"
  color: "0E8A16"
  description: "AI / LLM / agents"
- name: "area: infra"
  color: "5319E7"
  description: "CI/CD / infrastructure"

# Meta
- name: "good first issue"
  color: "7057FF"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is welcome"
- name: "dependencies"
  color: "0366D6"
  description: "Dependency updates"
- name: "ignore-for-release"
  color: "EEEEEE"
  description: "Exclude this PR from auto-generated release notes"
