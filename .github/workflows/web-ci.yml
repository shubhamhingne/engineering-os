name: web-ci
on:
  push: { branches: [main], paths: ["apps/web/**", "packages/**", ".github/workflows/web-ci.yml"] }
  pull_request: { paths: ["apps/web/**", "packages/**"] }
permissions: { contents: read }
concurrency: { group: web-ci-${{ github.ref }}, cancel-in-progress: true }
jobs:
  build:
    name: Lint · Type · Test · Build
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci || echo "no lockfile yet (skeleton)"
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm test --if-present
      - run: npm run build --if-present
