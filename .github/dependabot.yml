version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(deps)" }
  - package-ecosystem: npm
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 10
    commit-message: { prefix: "chore(deps)" }
  - package-ecosystem: pip
    directory: "/apps/api"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(deps)" }
