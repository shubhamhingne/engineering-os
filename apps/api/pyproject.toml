[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "engineering-os-api"
version = "1.0.0"
description = "Engineering OS API — a semantic compiler for software projects"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.110",
  "uvicorn[standard]>=0.29",
  "sqlalchemy>=2.0",
  "pydantic>=2.6",
  "pydantic-settings>=2.2",
  "anthropic>=0.39",
  "cryptography>=42",
  "alembic>=1.13",
  "psycopg[binary]>=3.1",   # PostgreSQL driver for the production database
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-cov>=5", "httpx>=0.27", "ruff>=0.6", "mypy>=1.11", "hypothesis>=6.100"]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
extend-exclude = ["migrations/versions"]  # autogenerated Alembic revisions
